[package]
name = "session-insights"
version = "0.1.0"
edition = "2021"
description = "Per-session work metrics for Claude Code. PostToolUse + Stop hooks roll up tool calls, turns, files touched, a size class (XS–XL) and a work category per session, with an optional dated session log written to an Obsidian vault."
license = "MIT"

[[bin]]
name = "session-insights"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
chrono = { version = "0.4", features = ["clock"], default-features = false }
clap = { version = "4", features = ["derive"] }
dirs = "5"
anyhow = "1"
