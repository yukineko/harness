name: macOS binaries

# Builds the bundled per-platform macOS binaries on a real macOS runner and
# commits them back into bin/. They can't be cross-built from Linux (linking the
# Apple frameworks needs the macOS SDK), so CI is the no-Mac path to keep
# bin/ctxrot-darwin-* in sync with src/.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/build-plugin-bin.sh'

permissions:
  contents: write

concurrency:
  group: macos-binaries
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14 # Apple Silicon → host build is arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build darwin binaries (arm64 host + x86_64 cross)
        run: |
          scripts/build-plugin-bin.sh                    # → bin/ctxrot-darwin-arm64
          scripts/build-plugin-bin.sh x86_64-apple-darwin # → bin/ctxrot-darwin-x86_64

      - name: Commit binaries if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git update-index --chmod=+x bin/ctxrot-darwin-arm64 bin/ctxrot-darwin-x86_64 || true
          git add bin/ctxrot-darwin-arm64 bin/ctxrot-darwin-x86_64
          if git diff --cached --quiet; then
            echo "macOS binaries already up to date."
            exit 0
          fi
          git commit -m "ci: build macOS binaries [skip ci]"
          git push
