[package]
name = "tracekit"
version = "0.1.0"
edition = "2021"
description = "Span-tree tracer for condukt runs. Records the interpreterâ†’workerâ†’verifier phases of one run as a parent-linked span tree (phase, model, ms, cost, status), renders it with `tracekit trace <RID>`, and exports it as OpenTelemetry GenAI-semconv JSON. Subscription-native: file-only, no network, no API key."
license = "MIT"

[[bin]]
name = "tracekit"
path = "src/main.rs"

[dependencies]
harness-core = { path = "../harness-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
