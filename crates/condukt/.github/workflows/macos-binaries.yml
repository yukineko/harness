name: macOS binaries

# Builds and commits the macOS per-platform binaries that cannot be cross-built
# from Linux (Apple SDK required). Runs on an Apple-Silicon runner, builds both
# arm64 (host) and x86_64 (cross), fixes exec bits in the git index, and pushes.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/build-plugin-bin.sh"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build arm64 (host) + x86_64 (cross)
        run: |
          rustup target add x86_64-apple-darwin
          scripts/build-plugin-bin.sh
          scripts/build-plugin-bin.sh x86_64-apple-darwin
      - name: Commit binaries with exec bit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/condukt-darwin-arm64 bin/condukt-darwin-x86_64 bin/condukt
          git update-index --chmod=+x bin/condukt-darwin-arm64 bin/condukt-darwin-x86_64 bin/condukt
          if git diff --cached --quiet; then
            echo "no binary changes"
          else
            git commit -m "ci: build macOS binaries [skip ci]"
            git push
          fi
