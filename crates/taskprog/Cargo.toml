[package]
license.workspace = true
name = "taskprog"
version = "0.1.1"
edition = "2021"

[[bin]]
name = "taskprog"
path = "src/main.rs"

[dependencies]
harness-core = { path = "../harness-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
clap = { version = "4", features = ["derive"] }
dirs = "5"
anyhow = "1"
