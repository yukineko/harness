[package]
rust-version.workspace = true
license.workspace = true
name = "taskprog"
version = "0.1.1"
edition = "2021"
description = "Multi-session progress file for Claude Code. Injects .claude/progress.md at SessionStart so the agent knows what is pending; at Stop it prompts the agent to keep the file current, enabling seamless human-on-the-loop handoff across sessions."

[[bin]]
name = "taskprog"
path = "src/main.rs"

[dependencies]
harness-core = { path = "../harness-core" }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
clap = { version = "4", features = ["derive"] }
dirs = "6"
anyhow = { workspace = true }
