# taskprog.toml — multi-session progress file for Claude Code
#
# Place in the project root or home (~/.taskprog/config.toml).

enabled = true

# Path to the progress markdown file.
# Default: <cwd>/.claude/progress.md
# progress_file = "~/.claude/progress.md"

# Max bytes of the progress file to inject at SessionStart.
# 0 = inject the entire file (no limit).
inject_limit = 4096
