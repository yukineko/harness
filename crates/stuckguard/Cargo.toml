[package]
name = "stuckguard"
version = "0.1.0"
edition = "2021"
description = "Stuck-loop detector + escalation for Claude Code. A PostToolUse hook that spots repeated identical actions and edit thrash, then nudges the agent to change approach or ask the user for help."
license = "MIT"

[[bin]]
name = "stuckguard"
path = "src/main.rs"

[dependencies]
harness-core = { path = "../harness-core" }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
chrono = { workspace = true }
clap = { version = "4", features = ["derive"] }
dirs = "5"
anyhow = { workspace = true }
