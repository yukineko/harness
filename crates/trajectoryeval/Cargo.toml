[package]
name = "trajectoryeval"
version = "0.1.0"
edition = "2021"
description = "Trajectory-match verifier: checks the PATH a worker took (its ordered tool-call sequence) against an expected trajectory spec — the trajectory sibling of an output verifier. Inspired by langchain-ai/agentevals."
license = "MIT"

[[bin]]
name = "trajectoryeval"
path = "src/main.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
clap = { version = "4", features = ["derive"] }
anyhow = { workspace = true }
