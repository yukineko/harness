[package]
rust-version.workspace = true
name = "specguard"
version = "0.1.1"
edition = "2021"
description = "Project-agnostic spec/implementation drift audit harness. Drives an LLM agent (read-only) to check that an implementation still matches its canonical specs, and that the specs themselves are free of silence/contradiction/duplication."
license = "MIT"
readme = "README.md"

[[bin]]
name = "specguard"
path = "src/main.rs"

# specforge — the generation-side harness (sibling to specguard, see DESIGN.md).
# A separate binary so specguard's read-only enforcement stays uncontaminated.
[[bin]]
name = "specforge"
path = "src/forge/main.rs"

[dependencies]
harness-core = { path = "../harness-core" }
clap = { version = "4", features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
anyhow = { workspace = true }
globset = "0.4"
chrono = { workspace = true }

[[test]]
name = "testaudit"
path = "src/testaudit.rs"

[dev-dependencies]
tempfile = { workspace = true }
proptest = { version = "1", default-features = false, features = ["std"] }
