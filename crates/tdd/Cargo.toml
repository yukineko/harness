[package]
name = "tdd"
version = "0.1.3"
edition = "2021"
rust-version = "1.82"
description = "Test-first gate for Claude Code. On Stop it blocks when implementation changed without an accompanying test (you must write tests); and the `red`/`green`/`verify` subcommands make test-first (RED before GREEN) a verifiable artifact for the /tdd skill. Subscription-native (one hook + bundled Rust binary, no API key)."
license = "MIT"

[[bin]]
name = "tdd"
path = "src/main.rs"

[dependencies]
harness-core = { path = "../harness-core" }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
globset = "0.4"
regex = { workspace = true }
chrono = { workspace = true }
clap = { version = "4", features = ["derive"] }
dirs = "5"
anyhow = { workspace = true }
