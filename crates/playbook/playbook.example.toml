# playbook.example.toml — copy to ./playbook.toml (or ~/.playbook/config.toml).
#
# A UserPromptSubmit hook scores the curated notes against your prompt and
# injects the most relevant ones as added context — under a hard char budget so
# it never bloats the conversation. Notes are atomic markdown files in the store.

enabled = true
# store_dir = "~/.playbook/store"
top_k = 3              # max notes injected per prompt
min_score = 5          # relevance threshold (always-notes bypass this)
max_chars = 1500       # hard cap on total injected characters
include_global = true  # also search the shared _global store
