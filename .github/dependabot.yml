# Dependabot keeps the workspace's Cargo deps and the GitHub Actions used by
# the CI workflows up to date. Both ecosystems run weekly; minor/patch bumps are
# grouped into a single PR per ecosystem to keep review noise low, while major
# bumps stay separate so breaking changes are reviewed on their own.
#
# Note: the Cargo ecosystem points at the workspace root ("/"). Dependabot reads
# the root Cargo.toml/Cargo.lock and covers every member crate under crates/*,
# so there is no need for a per-crate entry.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
