name: msrv

# Verify the declared Minimum Supported Rust Version actually builds. The
# workspace pins `rust-version = "1.85"` (workspace.package; the floor the current
# dependency surface needs — edition2024 deps require 1.85), but a declaration is
# only a promise until CI enforces it — it's easy to land a newer-Rust API or a
# dependency bump that silently raises the real floor.
# cargo-hack's `--rust-version` checks every crate against the MSRV in its own
# manifest (auto-installing the toolchain via rustup), so a violation fails here
# instead of on a user pinned to 1.82. Installed via `cargo install --locked`
# (no third-party action; reproducible), matching semver.yml / security-audit.yml.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/msrv.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/msrv.yml'

permissions:
  contents: read

concurrency:
  group: msrv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-hack
        run: cargo install cargo-hack --locked
      - name: Check workspace against declared MSRV
        # --rust-version: use each crate's rust-version field (cargo-hack installs
        #   the matching toolchain via rustup as needed).
        # --ignore-private: skip crates with `publish = false` that aren't part of
        #   the distributed surface.
        # (No --all-targets: dev-dependencies may require a newer Rust than the
        #  library MSRV, which would be a false MSRV failure; check the lib/bin
        #  surface that users actually compile against.)
        run: cargo hack check --rust-version --workspace --ignore-private
