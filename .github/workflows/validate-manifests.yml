name: validate-manifests

# Schema/consistency gate for the plugin distribution manifests. The harness
# ships ~33 plugins through one git-subdir marketplace; a malformed
# marketplace.json or crate plugin.json (missing field, non-kebab name, version
# that isn't semver, dangling source.path, or the two manifests disagreeing on a
# plugin's name) would only break at install time on a user's machine. This makes
# it a merge-blocking check. Self-contained stdlib Python — no third-party action.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'
      - 'crates/*/.claude-plugin/plugin.json'
      - 'scripts/validate-manifests.py'
      - 'scripts/test_validate_manifests.py'
      - '.github/workflows/validate-manifests.yml'
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'crates/*/.claude-plugin/plugin.json'
      - 'scripts/validate-manifests.py'
      - 'scripts/test_validate_manifests.py'
      - '.github/workflows/validate-manifests.yml'

permissions:
  contents: read

concurrency:
  group: validate-manifests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Unit-test the validator
        run: python3 scripts/test_validate_manifests.py
      - name: Validate marketplace + plugin manifests
        run: python3 scripts/validate-manifests.py
