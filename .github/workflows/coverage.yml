name: coverage

# Measure workspace line coverage and gate on a floor so coverage can only
# ratchet up. Uses cargo-llvm-cov — the de-facto Rust workspace coverage tool,
# built on the compiler's source-based LLVM instrumentation (accurate; no
# separate ptrace pass like tarpaulin, and it understands a multi-crate
# workspace natively). Installed via `cargo install --locked` (no third-party
# action; reproducible), matching msrv.yml / semver.yml / security-audit.yml —
# we deliberately prefer this over taiki-e/install-action to keep the CI supply
# chain first-party, consistent with the rest of this repo's workflows.
#
# The report is fully self-contained: an lcov file plus a text summary are
# written to the run's Job Summary and uploaded as an artifact, so the numbers
# show up on every PR check with no external service and no token. Codecov
# upload (trend graphs over time) is left as a commented, token-gated opt-in at
# the bottom — nothing here reaches the network beyond the crates.io installs
# the other workflows already do.
#
# This is a separate job from build-binaries.yml's `smoke` gate; it does not
# touch or weaken that gate.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/coverage.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/coverage.yml'

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

env:
  # Coverage floor, in line-% . CI fails (non-zero exit) if workspace line
  # coverage drops below this. It is a *floor to ratchet upward*, not a target:
  # raise it whenever coverage comfortably clears it, and never lower it to make
  # a red build pass.
  #
  # Rationale for the initial value: measured workspace line coverage at the time
  # this job was added was ~72% (`cargo llvm-cov --workspace --summary-only`).
  # 65 is that number minus a few points of headroom, so ordinary PRs that add
  # some untested glue do not immediately trip the gate, while a real regression
  # (e.g. deleting a tested module or landing a large untested subsystem) still
  # fails it. Tighten toward the actual number in follow-ups as coverage grows.
  COVERAGE_MIN_LINES: "65"

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # cargo-llvm-cov drives the LLVM tools (llvm-profdata / llvm-cov) that
          # ship in this rustup component to turn the instrumented run into a
          # report; without it the coverage step cannot process the profiles.
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      # Instrument + run the same surface the smoke gate tests (`--workspace`,
      # default features) so the numbers reflect what CI already exercises.
      # `--no-report` keeps the raw profile data around so the report / summary /
      # gate steps below can each re-render it without recompiling.
      - name: Run instrumented workspace tests
        run: cargo llvm-cov --workspace --no-report
      - name: Generate lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Write coverage summary to job summary
        run: |
          set -euo pipefail
          {
            echo "## Coverage (line %, floor ${COVERAGE_MIN_LINES}%)"
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7
      # The gate runs last so the lcov artifact and job-summary table above are
      # always produced first — even on a run that ends up failing the floor,
      # you can still see (and download) exactly where coverage stands.
      - name: Enforce coverage floor
        run: cargo llvm-cov report --summary-only --fail-under-lines "${COVERAGE_MIN_LINES}"

      # --- Codecov (opt-in, trend visualization) ----------------------------
      # Codecov renders coverage *trends over time* and per-PR deltas. It is off
      # by default because it needs a repo token and uploads to an external
      # service; the self-contained lcov artifact + job summary above already
      # surface the numbers on every PR without any secret. To enable trend
      # graphs: add the CODECOV_TOKEN repo secret, switch the README badge to
      # the Codecov one, and uncomment the step below.
      #
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: lcov.info
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     fail_ci_if_error: false
