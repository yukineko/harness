name: build & commit plugin binaries

# Build the per-plugin bundled binaries on real runners and commit them
# back into crates/<plugin>/bin/. The committed per-platform binaries are what
# `/plugin install` ships, so end users need neither cargo nor an API key.
#
#   * smoke  — build + test the whole workspace on Linux and macOS (the gate).
#   * darwin — build every distributable plugin for both apple targets (macos-14).
#   * linux  — build every distributable plugin for x86_64 linux (ubuntu).
#   * commit — collect the artifacts and commit the refreshed bin/<name>-<os>-<arch>
#              back to main (only on push-to-main / manual dispatch, never on PRs).
#
# specguard (no committed bin/, dual-binary) and harness-core (a library) are not
# distributed and are intentionally excluded from the binary matrix.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**/src/**'
      - 'crates/**/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/build-plugin-bin.sh'
      - '.github/workflows/build-binaries.yml'
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: true

env:
  # Distributable plugins, by crate directory (the script reads the package name
  # from each Cargo.toml, so run-book → package runbook is handled).
  PLUGINS: >-
    autoflow backlog beacon budgetguard compass context-governor condukt ctxrot curate daily
    deepwiki difflog donegate evalkit flow fugu-router gauge harness-status
    hypothesis playbook precommit-audit replaykit reviewgate run-book schemaguard
    session-insights stuckguard taskprog tdd tracekit trajectoryeval

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/check-versions.sh
      # Reject panic=abort builds: catch_unwind (never-break-a-turn) is a NO-OP
      # under abort. Asserts [profile.release] pins unwind + the harness-core
      # compile_error! backstop is intact, before the heavy release build below.
      - run: ./scripts/check-unwind.sh
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace --release
      - run: cargo test  --workspace

  darwin:
    name: darwin binaries
    if: github.event_name != 'pull_request'
    needs: smoke
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build darwin binaries (arm64 + x86_64)
        run: |
          set -euo pipefail
          for p in $PLUGINS; do
            for t in aarch64-apple-darwin x86_64-apple-darwin; do
              bash scripts/build-plugin-bin.sh "$p" "$t"
            done
          done
      # tar preserves the crates/<plugin>/bin/ layout AND the executable bit.
      - run: tar czf darwin-bins.tar.gz crates/*/bin/*-darwin-*
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-bins
          path: darwin-bins.tar.gz
          retention-days: 1

  linux:
    name: linux binaries
    if: github.event_name != 'pull_request'
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build linux binaries (x86_64)
        run: |
          set -euo pipefail
          for p in $PLUGINS; do
            bash scripts/build-plugin-bin.sh "$p" x86_64-unknown-linux-gnu
          done
      - run: tar czf linux-bins.tar.gz crates/*/bin/*-linux-*
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bins
          path: linux-bins.tar.gz
          retention-days: 1

  commit:
    name: commit binaries
    # Only land binaries on main; never from a PR (can't/shouldn't push).
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [darwin, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # SLSA build provenance: id-token mints the OIDC token Sigstore signs with;
      # attestations writes the attestation to the repo's attestation store.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage rebuilt binaries
        run: |
          set -euo pipefail
          tar xzf artifacts/darwin-bins/darwin-bins.tar.gz
          tar xzf artifacts/linux-bins/linux-bins.tar.gz
      # Generate SLSA build provenance for the exact binaries we are about to
      # commit (and that `/plugin install` ships). The attestation binds each
      # binary's sha256 digest to this workflow run as the builder, so a consumer
      # can verify supply-chain origin with:
      #   gh attestation verify <binary> --repo <owner>/<repo>
      #   slsa-verifier verify-artifact <binary> --source-uri github.com/<owner>/<repo>
      # First-party action (actions/ org), consistent with the no-third-party
      # rule. Gated to main (the job's `if`), so only landed binaries are attested.
      - name: Attest build provenance for committed binaries
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            crates/*/bin/*-darwin-*
            crates/*/bin/*-linux-*
      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/*/bin
          if git diff --cached --quiet; then
            echo "binaries unchanged — nothing to commit"
            exit 0
          fi
          # [skip ci] is belt-and-suspenders: the bin/ paths are not in this
          # workflow's path filter, and pushes made with GITHUB_TOKEN do not
          # re-trigger workflows, so this commit will not loop.
          git commit -m "ci: rebuild plugin binaries [skip ci]"
          # checkout leaves a detached HEAD at the triggering SHA; push the new
          # commit explicitly onto main (fast-forward from that SHA).
          git push origin HEAD:main
