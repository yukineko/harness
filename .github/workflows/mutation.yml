name: mutation

# Mutation-testing kill-rate gate. Golden/regression CI proves the code still
# behaves as before; it says nothing about whether the tests would CATCH a fault.
# This job injects faults with the standard tool `cargo-mutants` and fails when the
# kill-rate (killed / viable mutants) of the existing tests drops below a
# threshold. See Meta ACH and PRIMG (arXiv:2505.05584).
#
# SCOPE (deliberately narrow — see scripts/mutation-gate.sh):
#   * ONE pilot crate only. Whole-workspace mutation is far too slow to gate on.
#     Pilot: harness-core (shared pure-ish logic). Expand one crate at a time.
#   * Overall job timeout bounds cost; cargo-mutants gets a per-mutant --timeout.
#
# TRIGGERS: this is intentionally NOT run on every PR (it is slow). It runs on
# manual dispatch, on a weekly schedule, and only on PRs/pushes that touch the
# mutation gate machinery itself — so it never surprises unrelated changes while
# the pilot is being calibrated.
on:
  workflow_dispatch:
    inputs:
      pilot:
        description: 'Pilot crate to mutate'
        default: 'harness-core'
        required: false
      min_kill_rate:
        description: 'Minimum kill-rate (0.0-1.0)'
        default: '0.80'
        required: false
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  pull_request:
    paths:
      - 'crates/mutategate/**'
      - 'scripts/mutation-gate.sh'
      - '.github/workflows/mutation.yml'
  push:
    branches: [main]
    paths:
      - 'crates/mutategate/**'
      - 'scripts/mutation-gate.sh'
      - '.github/workflows/mutation.yml'

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    # Hard cap: mutation runs are slow; never let one hang the queue.
    timeout-minutes: 30
    env:
      PILOT: ${{ github.event.inputs.pilot || 'harness-core' }}
      MIN_KILL_RATE: ${{ github.event.inputs.min_kill_rate || '0.80' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Sanity-check the deterministic gate (parser + kill-rate + exit code) before
      # spending time on the slow engine. These unit tests are the real guarantee.
      - name: Unit-test the gate logic
        run: cargo test --package mutategate
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation gate on pilot crate
        run: scripts/mutation-gate.sh
