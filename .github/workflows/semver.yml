name: semver-checks

# Detect accidental SemVer-breaking API changes across the workspace before they
# merge. With 35 crates sharing API boundaries (notably the build-time
# `harness-core` library every plugin links), a breaking change is easy to make
# unnoticed. cargo-semver-checks compares the public API against a baseline and
# fails on an undeclared break. Binary-only crates have no lib API and are simply
# skipped. Installed via `cargo install --locked` to match security-audit.yml
# (no third-party action; reproducible).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/semver.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/semver.yml'

permissions:
  contents: read

concurrency:
  group: semver-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so the baseline rev is available
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Determine baseline ref
        id: base
        run: |
          set -euo pipefail
          # Prefer the latest release tag; fall back to the PR base, then to the
          # previous commit, so the check still runs before any tag exists.
          tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$tag" ]; then
            ref="$tag"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            ref="${{ github.event.pull_request.base.sha }}"
          else
            ref="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "baseline = $ref"
      - name: cargo semver-checks (workspace)
        run: cargo semver-checks --workspace --baseline-rev "${{ steps.base.outputs.ref }}"
