name: eval

# Offline golden-regression evals (evalkit). Builds the workspace, then runs the
# repo's golden cases — prompt invariants (SKILL.md hard rules) and CLI output
# contracts — so a careless prompt edit or a changed --json shape fails the run
# before it merges. Deterministic and API-key-free: the offline sibling of
# condukt's online verifier.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'evals/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/eval.yml'
  pull_request:

permissions:
  contents: read

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build evalkit plus every binary a `cmd` case might exercise.
      - run: cargo build --workspace --release
      - name: Run golden evals
        run: ./target/release/evalkit run --root "$PWD" --bin-dir target/release

  # Replay the same goldens at the PR base and head and report what changed
  # (pass-rate, regressions, fixes). Informational — the `eval` job above is the
  # gate; this only annotates the PR so a SKILL.md edit's effect on the goldens is
  # visible side-by-side (promptfoo-style). Stratifying outcomes by skill version
  # is the canary half of the skill-fingerprint feature.
  canary:
    name: golden canary (base vs head)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Eval at PR base
        run: |
          set -euo pipefail
          git checkout --quiet --detach "${{ github.event.pull_request.base.sha }}"
          cargo build --workspace --release
          # `|| true`: a base predating a `cmd`'s tool (or evalkit itself) must not
          # abort the canary; an empty base.json just surfaces as a harness note.
          ./target/release/evalkit run --root "$PWD" --bin-dir target/release --json > base.json || true
      - name: Eval at PR head
        run: |
          set -euo pipefail
          git checkout --quiet --detach "${{ github.event.pull_request.head.sha }}"
          cargo build --workspace --release
          ./target/release/evalkit run --root "$PWD" --bin-dir target/release --json > head.json || true
      # The head build of evalkit (built last) has the `canary` subcommand.
      - name: Canary diff (base → head)
        run: ./target/release/evalkit canary --baseline base.json --current head.json
