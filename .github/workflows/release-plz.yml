name: release-plz

# Automate per-crate version bumps + CHANGELOGs for this git-subdir-distributed
# plugin monorepo (config: release-plz.toml). On every push to main:
#
#   * release-plz-pr    opens/updates ONE "release" PR that bumps each changed
#                       crate's semver (from conventional commits) and
#                       regenerates its per-crate CHANGELOG.md. A follow-up step
#                       syncs each plugin.json to its Cargo.toml version ON that
#                       PR, so the version-parity gate (check-versions.sh) stays
#                       green and both files land in the one PR.
#   * release-plz-release  after a release PR is merged, tags + creates a GitHub
#                       Release per crate. Nothing is published to crates.io
#                       (publish = false) — distribution is git-subdir.
#
# Uses the first-party release-plz action pinned to a major tag, consistent with
# the other workflows installing tools via `cargo install --locked` rather than
# reaching for many third-party actions.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Open/update the release PR (version bumps + CHANGELOGs), then sync plugin.json
  # parity onto that same PR branch.
  release-plz-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (open/update release PR)
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync plugin.json parity onto the release PR
        env:
          RELEASE_PR: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail
          # release-plz exposes the opened/updated PR as a JSON object; take its
          # head branch. No PR (nothing to release) -> clean no-op.
          BRANCH=$(printf '%s' "${RELEASE_PR:-}" | jq -r '.head_branch // empty')
          if [ -z "$BRANCH" ]; then
            echo "no release PR this run; nothing to sync"
            exit 0
          fi
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          scripts/sync-plugin-versions.sh
          # Stage only the plugin manifests (explicit paths, never `git add -A`).
          if git diff --quiet -- 'crates/*/.claude-plugin/plugin.json'; then
            echo "plugin.json already in parity with Cargo.toml"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/*/.claude-plugin/plugin.json
          git commit -m "chore: sync plugin.json versions to Cargo.toml (release-plz parity)"
          git push origin "HEAD:$BRANCH"

  # Tag + GitHub-release each crate whose release PR was merged. publish = false
  # in release-plz.toml means no crates.io upload.
  release-plz-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (tag + GitHub release)
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
