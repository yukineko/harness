# specforge config for the parallel PoC (②normalize + rigor).
[project]
name = "PoCParallel"
root = "."

[agent]
command = "claude"
args = [
  "--print",
  "--allowedTools", "Read", "Glob", "Grep",
  "Bash(git diff *)", "Bash(git log *)", "Bash(git show *)", "Bash(git status *)",
  "--disallowedTools", "Edit", "Write", "NotebookEdit", "WebFetch",
]

[output]
spec_dir = "specs"
sentinel = ".specforge-pending"
